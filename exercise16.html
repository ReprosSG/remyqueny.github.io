<!DOCTYPE html>
<html>
    <style>
        p.one{
            border-style: double;
            border-color: coral;
            background-color: lightblue;
            width: 200px;
        }
        p.two{
            border-style: groove;
            border-color: dodgerblue;
            border-radius: 5px;
            background-color: yellow;
            width: 200px;
        }
        p.three{
            border-style: dotted;
            border-color: gray;
            background-color: mediumseagreen;
            width: 200px;
        }
    </style>
    <body>
        <p class="one">
            Hello World
        </p>
        <p class="two">
            Hello World
        </p>
        <p class="three">
            Hello World
        </p>
    </body>
</html>
