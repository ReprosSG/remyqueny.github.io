<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: "Times New Roman", serif;
            padding: 40px;
        }

        .h1-style {
            font-size: 3rem;
            font-weight: bold;
            display: inline-block;
            position: relative;
            padding-top: 15px;
            text-shadow: 6px 6px 4px rgba(255, 192, 203, 0.8);
            margin-bottom: 40px;
        }

        .h1-style::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: black;
            box-shadow: 6px 6px 4px rgba(255, 192, 203, 0.8);
        }

        .h2-style {
            font-size: 2rem;
            font-style: italic;
            font-weight: normal;
            border: 2px solid black;
            padding: 5px 10px;
            margin-bottom: 50px;
            outline-color: yellow;
            outline-style: outset;
        }

        .h3-style {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: right;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1 class="h1-style">This is heading 1</h1>

    <h2 class="h2-style">This is heading 2</h2>

    <h3 class="h3-style">This is heading 3</h3>

</body>
</html>
