<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table &amp; Fixed Div</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #fff;
    }

    table {
      border-collapse: collapse;
      width: 260px;
    }

    table th {
      background-color: #595959;
      color: #fff;
      padding: 8px 16px;
      text-align: left;
      border: 2px solid #595959;
    }

    table td {
      padding: 8px 16px;
      border: 1px solid #595959;
    }

    table tbody tr:nth-child(odd) td {
      background-color: #ffff00;
    }

    table tbody tr:nth-child(even) td {
      background-color: #ffffff;
    }

    .fixed-box {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 160px;
      height: 120px;
      border: 3px solid #3a7d44;
      background-color: #fff;
      padding: 8px 10px;
      font-size: 15px;
      color: #333;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <table>
    <thead>
      <tr>
        <th>Firstname</th>
        <th>Lastname</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1</td>
        <td>1</td>
      </tr>
      <tr>
        <td>2</td>
        <td>2</td>
      </tr>
      <tr>
        <td>3</td>
        <td>3</td>
      </tr>
    </tbody>
  </table>

  <div class="fixed-box">
    This div element has position: fixed;
  </div>

</body>
</html>
